<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Générateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #111827; color: #f3f4f6; font-family: sans-serif; }
        .panel { background: #1f2937; padding: 15px; border-radius: 10px; border: 1px solid #374151; margin-bottom: 15px; }
        input, select { background: #0f172a !important; border: 1px solid #374151 !important; color: white !important; padding: 12px !important; width: 100%; border-radius: 8px; font-size: 16px !important; margin-bottom: 10px; }
        .final-box { background: #020617; color: #38bdf8; padding: 12px; border-radius: 6px; font-family: monospace; white-space: pre-wrap; font-size: 14px; border: 1px solid #1e293b; min-height: 80px; margin-top: 10px; }
        .btn-main { padding: 15px !important; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .menu-hidden { display: none; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div id="menu-selection">
        <h4 class="text-center mb-4">CHOISIR L'ÉVÉNEMENT</h4>
        <button class="btn btn-primary btn-main" onclick="loadGenerator('castle')">⚔️ CASTLE BATTLE</button>
        <button class="btn btn-warning btn-main" onclick="loadGenerator('bear')">🐻 BEAR TRAP</button>
        <button class="btn btn-success btn-main" onclick="loadGenerator('pets')">🐾 PETS STRATÉGIE</button>
        <button class="btn btn-info btn-main" onclick="loadGenerator('expert')">🛡️ EXPERT STRATÉGIE</button>
    </div>

    <div id="app-container" class="menu-hidden">
        <button class="btn btn-secondary btn-sm mb-3" onclick="location.reload()">⬅️ RETOUR</button>
        <div id="main-grid"></div>
    </div>
</div>

<script>
    const heroesList = ["Jabel", "Quinn", "Chenko", "Zoe", "Howard", "Marlin", "Amane", "Teonwoo"];

    function loadGenerator(type) {
        document.getElementById('menu-selection').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        const grid = document.getElementById('main-grid');
        
        if (type === 'castle') {
            grid.innerHTML = [0,1,2].map(i => `
                <div class="panel">
                    <label class="fw-bold">RALLY ${i + 1}</label>
                    <input type="text" placeholder="Leader..." oninput="update('castle')">
                    <select class="heroes" onchange="update('castle')"><option value="">Héros...</option>${heroesList.map(h => `<option value="${h}">${h}</option>`).join('')}</select>
                    <div class="final-box" id="out-${i}"></div>
                    <button class="btn btn-outline-light w-100 mt-2" onclick="copy(${i})">COPIER</button>
                </div>`).join('');
        } else {
            grid.innerHTML = `
                <div class="panel">
                    <label class="fw-bold text-uppercase">${type}</label>
                    <div class="final-box" id="out-0"></div>
                    <button class="btn btn-outline-light w-100 mt-2" onclick="copy(0)">COPIER</button>
                </div>`;
        }
        update(type);
    }

    function update(type) {
        if (type === 'castle') {
            document.querySelectorAll('.panel').forEach((p, i) => {
                const l = p.querySelector('input').value || '[LEADER]';
                const h = p.querySelector('.heroes').value || '[HÉROS]';
                document.getElementById('out-' + i).textContent = `⚔️ RALLY ${l}\n🔥 ${h}`;
            });
        } else if (type === 'bear') {
            document.getElementById('out-0').textContent = `🐻 BEAR TRAP\n🔥 Chenko or Amane or Teonwoo\n⚔️ 10K-15K-40K\n🛡️ Total: 65K Max`;
        } else if (type === 'pets') {
            document.getElementById('out-0').textContent = `🐾 PETS STRATÉGIE\n[Instructions à définir ici]`;
        } else if (type === 'expert') {
            document.getElementById('out-0').textContent = `🛡️ EXPERT STRATÉGIE\n[Instructions à définir ici]`;
        }
    }

    function copy(i) {
        navigator.clipboard.writeText(document.getElementById('out-' + i).textContent);
        alert("Copié !");
    }
</script>
</body>
</html>
