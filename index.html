<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Alliance Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #111827; color: #f3f4f6; font-family: sans-serif; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-top: 20px; }
        .panel { background: #1f2937; padding: 15px; border-radius: 10px; border: 1px solid #374151; position: relative; }
        .final-box { background: #020617; color: #38bdf8; padding: 12px; border-radius: 6px; font-family: monospace; white-space: pre-wrap; font-size: 14px; border: 1px solid #1e293b; min-height: 80px; margin-top: 10px; }
        .btn-square { width: 110px; height: 110px; font-weight: bold; border-radius: 15px; }
        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-action { cursor: pointer; border: none; background: none; font-size: 16px; }
        .editor-box { background: #1f2937; padding: 20px; border-radius: 10px; border: 1px solid #374151; }
        input, textarea { background: #0f172a !important; border: 1px solid #374151 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container mt-4 text-center">
    <div class="mb-4">
        <a href="https://qegukom-create.github.io/NR1-MAIN/" class="btn btn-outline-secondary btn-sm">⬅️ GO TO MAIN</a>
    </div>

    <div id="main-menu" class="d-flex justify-content-center gap-3 mb-5">
        <button class="btn btn-primary btn-square" onclick="navigate('rally')">⚔️<br>RALLY</button>
        <button class="btn btn-info btn-square" onclick="navigate('strategy')">🛡️<br>STRATEGY</button>
        <button class="btn btn-warning btn-square" onclick="navigate('event')">🏆<br>EVENT</button>
    </div>

    <div id="app-container">
        <button class="btn btn-secondary btn-sm mb-3" onclick="location.reload()">⬅️ BACK</button>
        <div id="dynamic-content"></div>
        <div id="editor-area" class="mt-4 editor-box d-none"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, set, push, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings",
        storageBucket: "nr1-vikings.firebasestorage.app",
        messagingSenderId: "1042283854890",
        appId: "1:1042283854890:web:84414b7afed626191ed753"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    window.navigate = async (path, subPath = null) => {
        const content = document.getElementById('dynamic-content');
        document.getElementById('editor-area').classList.add('d-none');
        
        const snapshot = await get(ref(db, subPath ? `templates/${path}/${subPath}` : `templates/${path}`));
        const data = snapshot.val() || {};
        
        content.innerHTML = `<h3 class="mb-4">${(subPath || path).toUpperCase()}</h3>`;
        
        if (!subPath) {
            for (let key in data) {
                content.innerHTML += `<button class="btn btn-outline-light m-2" onclick="navigate('${path}', '${key}')">${key}</button>`;
            }
            content.innerHTML += `<br><button class="btn btn-success mt-4" onclick="showEditor('sub', '${path}')">+ NEW SUB-CATEGORY</button>`;
        } else {
            let htmlContent = `<div class="grid-container">`;
            for (let key in data) {
                const item = data[key];
                if (item && item.content) {
                    htmlContent += `
                        <div class="panel">
                            <div class="actions">
                                <button class="btn-action" onclick="editItem('${path}', '${subPath}', '${key}', '${encodeURIComponent(item.label)}', '${encodeURIComponent(item.content)}')">✏️</button>
                                <button class="btn-action" onclick="deleteItem('${path}/${subPath}', '${key}')">✖</button>
                            </div>
                            <div class="fw-bold mb-2 text-start">${item.label || ''}</div>
                            <div class="final-box">${item.content}</div>
                            <button class="btn btn-outline-light w-100 mt-3" onclick="navigator.clipboard.writeText(\`${item.content.replace(/`/g, '\\`')}\`)">COPY</button>
                        </div>`;
                }
            }
            htmlContent += `</div><button class="btn btn-success mt-4" onclick="showEditor('tpl', '${path}', '${subPath}')">+ NEW TEMPLATE</button>`;
            content.innerHTML += htmlContent;
        }
    };

    window.showEditor = (type, path, subPath = null, key = null, label = '', content = '') => {
        const editor = document.getElementById('editor-area');
        editor.classList.remove('d-none');
        editor.innerHTML = `
            <input id="new-name" value="${label}" placeholder="Titre du template" class="form-control mb-3">
            <textarea id="new-content" class="form-control mb-3" rows="4" placeholder="Contenu du message...">${content}</textarea>
            <button class="btn btn-primary w-100" onclick="saveData('${type}', '${path}', '${subPath}', '${key || ''}')">SAVE TO FIREBASE</button>
        `;
    };

    window.editItem = (path, subPath, key, label, content) => {
        showEditor('tpl', path, subPath, key, decodeURIComponent(label), decodeURIComponent(content));
    };

    window.saveData = async (type, path, subPath, key) => {
        const label = document.getElementById('new-name').value;
        const content = document.getElementById('new-content').value;
        if (type === 'sub') {
            await set(ref(db, `templates/${path}/${label}/init`), { label: "Init", content: "..." });
        } else if (key) {
            await update(ref(db, `templates/${path}/${subPath}/${key}`), { label, content });
        } else {
            await push(ref(db, `templates/${path}/${subPath}`), { label, content });
        }
        navigate(path, subPath);
    };

    window.deleteItem = async (path, key) => {
        if (confirm("Supprimer cet élément ?")) {
            await remove(ref(db, `templates/${path}/${key}`));
            location.reload();
        }
    };
</script>
</body>
</html>
